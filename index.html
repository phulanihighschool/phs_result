<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phulani High School - Student Result Portal</title>
    <script src="data.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Manrope:wght@400;500;600;700;800&family=Libre+Baskerville:wght@400;700&display=swap');

        :root {
            --navy-900: #071c3a;
            --navy-800: #0a2349;
            --gold-500: #cfa23a;
            --green-700: #16653a;
            --paper: #f2f0ed;
            --card: #f8f7f5;
            --ink: #1d2a36;
            --danger: #b33131;
            --success: #0f6f3f;
            --shadow: 0 8px 22px rgba(15, 30, 58, 0.14);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Manrope', 'Segoe UI', sans-serif;
            color: var(--ink);
            background: radial-gradient(circle at 20% 10%, #ffffff 0%, #f2f0ed 42%, #ece9e6 100%);
            min-height: 100vh;
        }

        /* =========================================
           SCREEN UI: ORIGINAL DASHBOARD STYLES
           ========================================= */
        .masthead {
            background: repeating-linear-gradient(90deg, var(--navy-900) 0, var(--navy-900) 70px, var(--navy-800) 70px, var(--navy-800) 72px);
            color: #fff;
            border-bottom: 5px solid var(--gold-500);
            box-shadow: 0 7px 20px rgba(4, 15, 30, 0.32);
        }

        .masthead-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 12px 20px 16px;
            display: grid;
            grid-template-columns: 98px 1fr;
            gap: 16px;
            align-items: center;
        }

        .logo-wrap {
            width: 90px;
            height: 90px;
            background: #fff;
            border-radius: 14px;
            border: 3px solid #d9d9d9;
            box-shadow: 0 5px 14px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .top-small { text-transform: uppercase; letter-spacing: 2.4px; font-size: 12px; margin: 0 0 7px; opacity: 0.86; }

        .school-line {
            margin: 0; text-transform: uppercase; letter-spacing: 2.2px;
            font-size: clamp(24px, 3.3vw, 36px); font-family: 'Cinzel', Georgia, serif; font-weight: 700; line-height: 1.1;
        }

        .layout { max-width: 1100px; margin: 20px auto; padding: 0 20px 20px; }

        .search-panel { max-width: 1100px; margin: 8px auto 2px; display: flex; justify-content: center; }

        .search-card {
            width: min(560px, 100%); border: 1px solid #d2dae2; border-radius: 16px;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            box-shadow: 0 14px 32px rgba(7, 28, 58, 0.12); padding: 18px;
            display: grid; grid-template-columns: 1fr; gap: 10px; align-items: stretch;
        }

        select, input[type="text"] {
            width: 100%; height: 44px; border-radius: 10px; border: 1px solid #c2c9ce;
            background: #fff; color: #1a2a3a; font-size: 16px; padding: 0 12px;
        }

        .btn { height: 44px; border-radius: 10px; border: none; font-size: 15px; font-weight: 800; cursor: pointer; padding: 0 18px; }
        .btn-get { background: linear-gradient(160deg, var(--navy-900), #08264f); color: #fff; width: 100%; }
        .btn-print { background: linear-gradient(160deg, #8c6622, var(--gold-500)); color: #fff; width: auto; min-width: 128px; }
        .btn-another { background: #ffffff; color: #122e4f; border: 1px solid #aac0d8; width: auto; min-width: 168px; }

        .result-actions { display: none; justify-content: center; gap: 10px; max-width: 210mm; margin: 0 auto 12px; }

        .error { display: none; color: var(--danger); font-weight: 700; font-size: 14px; margin-top: 8px; }

        .report-wrapper { display: none; }

        .screen-report {
            max-width: 210mm; margin: 12px auto 20px;
            background: linear-gradient(180deg, #ffffff 0%, #f6f9fd 100%);
            padding: 26px; border: 1px solid #c7d4e3; border-radius: 14px;
            box-shadow: 0 14px 30px rgba(8, 36, 79, 0.12);
        }

        .result-title { margin: 0 0 12px; text-align: center; font-size: 20px; font-weight: 800; letter-spacing: .6px; color: #12345f; }

        .student-ribbon { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 14px; }
        .student-pill { border: 1px solid #cbd9e7; border-radius: 8px; background: #f5f8fc; padding: 10px 12px; display: flex; flex-direction: column; justify-content: center; }
        .student-pill .label { font-size: 11px; text-transform: uppercase; color: #39516d; font-weight: 700; margin-bottom: 4px; letter-spacing: .5px; }
        .student-pill .value { font-size: 18px; font-weight: 800; color: #102e51; line-height: 1.1; }

        .marks-panel { margin-bottom: 12px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 0; }
        th, td { border: 1px solid #b8c8d9; padding: 12px 15px; text-align: center; }
        th { background-color: #12345f; color: #fff; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
        td.subject-name { text-align: left; font-weight: 500; }
        tbody tr:nth-child(even) { background-color: #edf3f9; }

        .result-snapshot {
            border: 1px solid #b8c8d9; border-radius: 10px;
            background: linear-gradient(180deg, #edf3fa 0%, #e3edf8 100%);
            padding: 10px; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; align-items: stretch;
        }
        .snapshot-item { background: #fff; border: 1px solid #c3d1df; border-radius: 8px; padding: 8px 10px; display: flex; flex-direction: column; justify-content: center; text-align: center; }
        .snapshot-item .label { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: #415972; margin-bottom: 3px; font-weight: 700; }
        .snapshot-item .value { font-size: 18px; font-weight: 800; color: #0d2c50; line-height: 1.1; }

        .status-badge { display: inline-flex; align-items: center; justify-content: center; min-height: 34px; border-radius: 999px; font-size: 14px; font-weight: 800; letter-spacing: .6px; text-transform: uppercase; border: 1px solid transparent; padding: 0 12px; }
        .status-pass { background: #dbf2e5; color: #0d683c; border-color: #88c6a0; }
        .status-fail { background: #f8e1e1; color: #9e2c2c; border-color: #d59b9b; }

        body.result-mode { background: #f5f7fb; height: 100vh; overflow: hidden; }
        body.result-mode .search-panel { display: none !important; }
        body.result-mode .layout { margin-top: 0; height: calc(100vh - 118px); padding-top: 10px; padding-bottom: 10px; max-width: none; width: 100%; display: grid; grid-template-rows: 1fr auto; }
        body.result-mode .report-wrapper { display: flex; justify-content: stretch; align-items: flex-start; overflow: hidden; width: 100%; flex-direction: column;}
        body.result-mode .result-actions { display: flex; margin-top: 8px; margin-bottom: 0; padding-top: 8px; border-top: 1px solid #d3dde8; width: 100%; max-width: none; }
        
        /* The print layout is strictly hidden on screen */
        .print-report { display: none; }

        @media (max-width: 780px) {
            .masthead-inner { grid-template-columns: 1fr; text-align: center; }
            .logo-wrap { margin: 0 auto; }
            .result-actions { justify-content: center; flex-wrap: wrap; }
            .student-ribbon { grid-template-columns: 1fr 1fr; }
            .result-snapshot { grid-template-columns: 1fr 1fr; }
        }

        /* =========================================
           PRINT UI: FORMAL DOCUMENT STYLES
           ========================================= */
        @media print {
            @page { size: A4 portrait; margin: 10mm; }
            
            body { background: #fff; margin: 0; padding: 0; }
            
            /* Hide ALL screen elements */
            .masthead, .search-panel, .result-actions, .screen-report { display: none !important; }
            
            /* Show and format print elements */
            .report-wrapper { display: block !important; overflow: visible !important; height: auto !important; }
            .print-report { 
                display: block; 
                position: relative;
                width: 100%;
                min-height: 270mm;
                padding: 12mm;
                background: white;
                border: 6px double #071c3a;
                box-sizing: border-box;
                -webkit-print-color-adjust: exact;
                color-adjust: exact;
            }

            /* Watermark Image Layered Behind */
            .print-watermark {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                width: 450px;
                opacity: 0.08;
                z-index: -1;
            }

            .print-header {
                text-align: center;
                border-bottom: 2px solid #071c3a;
                padding-bottom: 15px;
                margin-bottom: 25px;
            }

            .print-header img { width: 80px; margin-bottom: 8px; }
            .print-header h1 { font-family: 'Cinzel', serif; font-size: 28px; color: #071c3a; margin: 0 0 5px; }
            .print-header p { font-size: 14px; font-weight: 700; margin: 0 0 10px; letter-spacing: 1px; }
            .print-header .session { background: #071c3a; color: white; display: inline-block; padding: 4px 15px; font-size: 13px; font-weight: bold; text-transform: uppercase; }

            .print-student-info {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
                margin-bottom: 25px;
                font-size: 15px;
            }
            .print-info-row { border-bottom: 1px dashed #ccc; padding-bottom: 4px; }
            .print-info-row strong { color: #333; display: inline-block; width: 120px; }

            .print-report table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
            .print-report th { background-color: #f0f0f0 !important; color: #000; border: 1px solid #000; padding: 10px; font-weight: bold; font-size: 13px; }
            .print-report td { border: 1px solid #000; padding: 10px; text-align: center; font-size: 14px; }
            .print-report td.subject-name { text-align: left; font-weight: bold; }

            .print-summary {
                display: flex;
                justify-content: space-between;
                border: 2px solid #000;
                padding: 15px 25px;
                margin-bottom: 50px;
                background-color: #fafafa !important;
            }
            .print-summary div { text-align: center; }
            .print-summary span.lbl { display: block; font-size: 11px; text-transform: uppercase; font-weight: bold; color: #555; }
            .print-summary span.val { display: block; font-size: 20px; font-weight: 800; color: #000; margin-top: 5px; }

            .print-signatures {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
                padding: 0 20px;
            }
            .print-sig-block { text-align: center; width: 180px; }
            .print-sig-block img { width: 140px; height: auto; margin-bottom: -5px; mix-blend-mode: multiply; }
            .print-sig-line { border-top: 1px solid #000; padding-top: 5px; font-weight: bold; font-size: 14px; }
        }
    </style>
</head>
<body>
    <header class="masthead">
        <div class="masthead-inner">
            <div class="logo-wrap">
                <img src="logo.png" alt="School Logo" onerror="this.style.display='none'">
            </div>
            <div>
                <p class="top-small">Phulani High School, Majuli</p>
                <h1 class="school-line">Student Result Portal</h1>
            </div>
        </div>
    </header>

    <main class="layout">
        <section class="search-panel">
            <div class="search-card" id="searchUI">
                <select id="classSelect">
                    <option value="" disabled selected>Select Class...</option>
                    <option value="Class6">Class 6</option>
                    <option value="Class7">Class 7</option>
                    <option value="Class8A">Class 8 - Section A</option>
                    <option value="Class8B">Class 8 - Section B</option>
                    <option value="Class9A">Class 9 - Section A</option>
                    <option value="Class9B">Class 9 - Section B</option>
                </select>
                <input type="text" id="rollNo" placeholder="Enter Roll Number...">
                <button class="btn btn-get" onclick="generateReport()">Get Result</button>
            </div>
            <div id="errorMsg" class="error"></div>
        </section>

        <section id="masterReportContainer" class="report-wrapper"></section>

        <div class="result-actions" id="resultActions">
            <button class="btn btn-print" id="printBtn" onclick="printReport()">Print Result</button>
            <button class="btn btn-another" id="anotherBtn" onclick="getAnotherResult()">Get Another Result</button>
        </div>
    </main>

    <script>
        const MAX_PER_SUBJECT = 100;
        const TOTAL_POSSIBLE = 600;
        const DEFAULT_PAGE_TITLE = document.title;
        let currentPrintTitle = 'student_phs';

        function toFileSafeName(name) {
            return String(name || '').trim().toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'student';
        }

        function printReport() {
            document.title = currentPrintTitle;
            window.print();
        }

        function fitResultToViewport() {
            if (!document.body.classList.contains('result-mode')) return;
            const wrapper = document.getElementById('masterReportContainer');
            const screenReport = wrapper.querySelector('.screen-report');
            if (!wrapper || !screenReport) return;

            screenReport.style.transform = 'none';
            const availableHeight = Math.max(0, wrapper.clientHeight - 4);
            const availableWidth = Math.max(0, wrapper.clientWidth - 4);
            const naturalHeight = screenReport.offsetHeight;
            const naturalWidth = screenReport.offsetWidth;

            const scale = Math.min(1, availableHeight / naturalHeight, availableWidth / naturalWidth);
            screenReport.style.transform = `scale(${scale})`;
            screenReport.style.transformOrigin = 'top center';
        }

        function getAnotherResult() {
            document.body.classList.remove('result-mode');
            const masterContainer = document.getElementById('masterReportContainer');
            masterContainer.innerHTML = '';
            masterContainer.style.display = 'none';
            document.getElementById('resultActions').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('classSelect').selectedIndex = 0;
            const rollInput = document.getElementById('rollNo');
            rollInput.value = '';
            rollInput.focus();
        }

        window.addEventListener('afterprint', () => { document.title = DEFAULT_PAGE_TITLE; });
        window.addEventListener('resize', fitResultToViewport);

        function generateReport() {
            const className = document.getElementById('classSelect').value;
            const roll = document.getElementById('rollNo').value.trim();
            const errorDiv = document.getElementById('errorMsg');
            const masterContainer = document.getElementById('masterReportContainer');

            errorDiv.style.display = 'none';
            masterContainer.innerHTML = '';

            if (!className || !roll || typeof schoolData === 'undefined') {
                errorDiv.innerText = 'Please check inputs and ensure data is loaded.';
                errorDiv.style.display = 'block';
                return;
            }

            const classData = schoolData[className];
            const selectEl = document.getElementById('classSelect');
            const classLabel = selectEl.options[selectEl.selectedIndex].text;

            if (!(classData && classData[roll])) {
                errorDiv.innerText = 'Record not found. Please verify class and roll number.';
                errorDiv.style.display = 'block';
                return;
            }

            const s = classData[roll];
            currentPrintTitle = `${toFileSafeName(s.name)}_phs`;
            
            const statusUpper = String(s.status || '').toUpperCase();
            const statusClass = statusUpper === 'PASS' ? 'status-pass' : statusUpper === 'FAIL' ? 'status-fail' : 'status-absent';

            // 1. GENERATE SCREEN HTML (Original Dashboard)
            const screenHTML = `
                <div class="screen-report">
                    <h3 class="result-title">Result Summary</h3>
                    <div class="student-ribbon">
                        <div class="student-pill"><span class="label">Student Name</span><span class="value">${s.name}</span></div>
                        <div class="student-pill"><span class="label">Class</span><span class="value">${classLabel}</span></div>
                        <div class="student-pill"><span class="label">Roll Number</span><span class="value">${roll}</span></div>
                    </div>
                    <div class="marks-panel">
                        <table>
                            <thead><tr><th style="text-align: left;">Subject</th><th>Maximum Marks</th><th>Marks Obtained</th></tr></thead>
                            <tbody>
                                <tr><td class="subject-name">Assamese</td><td>${MAX_PER_SUBJECT}</td><td>${s.assamese}</td></tr>
                                <tr><td class="subject-name">English</td><td>${MAX_PER_SUBJECT}</td><td>${s.english}</td></tr>
                                <tr><td class="subject-name">General Science</td><td>${MAX_PER_SUBJECT}</td><td>${s.science}</td></tr>
                                <tr><td class="subject-name">General Mathematics</td><td>${MAX_PER_SUBJECT}</td><td>${s.maths}</td></tr>
                                <tr><td class="subject-name">Social Science</td><td>${MAX_PER_SUBJECT}</td><td>${s.social}</td></tr>
                                <tr><td class="subject-name">Hindi</td><td>${MAX_PER_SUBJECT}</td><td>${s.hindi}</td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="result-snapshot">
                        <div class="snapshot-item"><div class="label">Grand Total</div><div class="value">${s.total} / ${TOTAL_POSSIBLE}</div></div>
                        <div class="snapshot-item"><div class="label">Percentage</div><div class="value">${s.percentage}%</div></div>
                        <div class="snapshot-item"><div class="label">Rank</div><div class="value">${s.rank}</div></div>
                        <div class="snapshot-item"><div class="label">Final Result</div><div class="value"><span class="status-badge ${statusClass}">${s.status}</span></div></div>
                    </div>
                </div>
            `;

            // 2. GENERATE PRINT HTML (Formal Document)
            const printHTML = `
                <div class="print-report">
                    <img src="logo.png" class="print-watermark" alt="">
                    
                    <div class="print-header">
                        <img src="logo.png" alt="Logo">
                        <h1>PHULANI HIGH SCHOOL</h1>
                        <p>MAJULI, ASSAM - ESTD: 1972</p>
                        <div class="session">ANNUAL PROGRESS REPORT : 2025 - 2026</div>
                    </div>

                    <div class="print-student-info">
                        <div class="print-info-row"><strong>Student Name:</strong> ${s.name}</div>
                        <div class="print-info-row"><strong>Roll Number:</strong> ${roll}</div>
                        <div class="print-info-row"><strong>Class:</strong> ${classLabel}</div>
                        <div class="print-info-row"><strong>Final Status:</strong> ${s.status}</div>
                    </div>

                    <table>
                        <thead><tr><th class="subject-name">Scholastic Areas</th><th>Max Marks</th><th>Marks Obtained</th></tr></thead>
                        <tbody>
                            <tr><td class="subject-name">Assamese</td><td>${MAX_PER_SUBJECT}</td><td>${s.assamese}</td></tr>
                            <tr><td class="subject-name">English</td><td>${MAX_PER_SUBJECT}</td><td>${s.english}</td></tr>
                            <tr><td class="subject-name">General Science</td><td>${MAX_PER_SUBJECT}</td><td>${s.science}</td></tr>
                            <tr><td class="subject-name">General Mathematics</td><td>${MAX_PER_SUBJECT}</td><td>${s.maths}</td></tr>
                            <tr><td class="subject-name">Social Science</td><td>${MAX_PER_SUBJECT}</td><td>${s.social}</td></tr>
                            <tr><td class="subject-name">Hindi</td><td>${MAX_PER_SUBJECT}</td><td>${s.hindi}</td></tr>
                        </tbody>
                    </table>

                    <div class="print-summary">
                        <div><span class="lbl">Grand Total</span><span class="val">${s.total} / ${TOTAL_POSSIBLE}</span></div>
                        <div><span class="lbl">Percentage</span><span class="val">${s.percentage}%</span></div>
                        <div><span class="lbl">Class Rank</span><span class="val">${s.rank}</span></div>
                    </div>

                    <div class="print-signatures">
                        <div class="print-sig-block">
                            <div style="height: 60px;"></div>
                            <div class="print-sig-line" style="border-top: 1px dashed #000;">Class Teacher</div>
                        </div>
                        <div class="print-sig-block">
                            <img src="sign.jpg" alt="HM Signature">
                            <div class="print-sig-line">Head Master</div>
                        </div>
                    </div>
                </div>
            `;

            // INJECT BOTH
            masterContainer.innerHTML = screenHTML + printHTML;
            masterContainer.style.display = 'flex';
            document.getElementById('resultActions').style.display = 'flex';
            document.body.classList.add('result-mode');
            
            // Allow DOM to update before scaling the screen version
            setTimeout(fitResultToViewport, 50);
        }
    </script>
</body>
</html>
